<script type="module">
import * as THREE from 'three';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ── RENDERER ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── SCENE / CAMERA ─────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x020610, 0.008);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 22, 55);
camera.lookAt(0, 2, 0);

// ── POST-PROCESSING ────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.65,   // strength
  0.55,   // radius
  0.72    // threshold — only truly bright things glow
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── RESIZE ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ══════════════════════════════════════════════════════════════════════════
//  NIGHT SKY
// ══════════════════════════════════════════════════════════════════════════
const skyGeo = new THREE.SphereGeometry(400, 32, 32);
const skyMat = new THREE.MeshBasicMaterial({
  color: 0x02050e,
  side: THREE.BackSide
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Stars
{
  const geo  = new THREE.BufferGeometry();
  const pos  = new Float32Array(4000 * 3);
  const col  = new Float32Array(4000 * 3);
  for (let i = 0; i < 4000; i++) {
    const phi   = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 390 + Math.random() * 5;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = Math.abs(r * Math.cos(phi)) + 5;
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
    const b = 0.6 + Math.random() * 0.4;
    col[i*3] = b; col[i*3+1] = b; col[i*3+2] = b + Math.random() * 0.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.35, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true
  })));
}

// ══════════════════════════════════════════════════════════════════════════
//  PITCH & GRASS
// ══════════════════════════════════════════════════════════════════════════

// Procedural grass texture
function makeGrass(w, h) {
  const cv  = document.createElement('canvas');
  cv.width  = w; cv.height = h;
  const ctx = cv.getContext('2d');

  // Base
  ctx.fillStyle = '#1a5218';
  ctx.fillRect(0, 0, w, h);

  // Pixel-level variation
  const img = ctx.getImageData(0, 0, w, h);
  const d   = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const n = (Math.random() - 0.5) * 28;
    d[i]   = Math.max(0, Math.min(255, d[i]   + n * 0.4));
    d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
    d[i+2] = Math.max(0, Math.min(255, d[i+2] + n * 0.3));
  }
  ctx.putImageData(img, 0, 0);

  // Fine grass blade strokes
  for (let i = 0; i < 25000; i++) {
    const x  = Math.random() * w;
    const y  = Math.random() * h;
    const len = 4 + Math.random() * 10;
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.7;
    const bright = 30 + Math.random() * 50;
    ctx.strokeStyle = `rgba(${Math.floor(bright * 0.4)},${Math.floor(bright + 50)},${Math.floor(bright * 0.3)},${0.15 + Math.random() * 0.4})`;
    ctx.lineWidth = 0.4 + Math.random() * 0.8;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.sin(ang) * len, y + Math.cos(ang) * len);
    ctx.stroke();
  }
  const t = new THREE.CanvasTexture(cv);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(12, 18);
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

// Pitch markings texture (full pitch, single canvas)
function makePitchMarkings() {
  const cv  = document.createElement('canvas');
  cv.width  = 2048; cv.height = 3072; // proportional to 68x105
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);

  const sx = cv.width / 68, sy = cv.height / 105;

  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth   = 6;

  function L(x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1*sx,y1*sy); ctx.lineTo(x2*sx,y2*sy); ctx.stroke(); }
  function R(x,y,w,h){ ctx.beginPath(); ctx.rect(x*sx,y*sy,w*sx,h*sy); ctx.stroke(); }
  function C(x,y,r){ ctx.beginPath(); ctx.arc(x*sx,y*sy,r*sx,0,Math.PI*2); ctx.stroke(); }

  // Boundary
  R(0,0,68,105);
  // Halfway line
  L(0,52.5,68,52.5);
  // Centre circle
  C(34,52.5,9.15);
  // Centre spot
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(34*sx,52.5*sy,4,0,Math.PI*2); ctx.fill();
  // Penalty areas
  R(13.84,0,40.32,16.5);
  R(13.84,88.5,40.32,16.5);
  // Goal areas
  R(24.84,0,18.32,5.5);
  R(24.84,99.5,18.32,5.5);
  // Penalty spots
  ctx.beginPath(); ctx.arc(34*sx,11*sy,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(34*sx,94*sy,4,0,Math.PI*2); ctx.fill();
  // Penalty arcs
  ctx.save(); ctx.beginPath();
  ctx.arc(34*sx,11*sy,9.15*sx,Math.PI*0.28,Math.PI*0.72); ctx.stroke();
  ctx.arc(34*sx,94*sy,9.15*sx,-Math.PI*0.72,-Math.PI*0.28); ctx.stroke();
  ctx.restore();
  // Corner arcs
  const cr = 0.9;
  [0,1].forEach(side => {
    [0,1].forEach(end => {
      const cx = side * 68, cy = end * 105;
      const sa = (side === 0 ? 0 : Math.PI) + (end === 0 ? -0.5 : 0.5) * Math.PI;
      ctx.beginPath();
      ctx.arc(cx*sx, cy*sy, cr*sx, sa, sa + Math.PI/2);
      ctx.stroke();
    });
  });

  const t = new THREE.CanvasTexture(cv);
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

const grassTex    = makeGrass(1024, 1024);
const markingsTex = makePitchMarkings();

// Pitch mow stripes
const PITCH_W = 36, PITCH_D = 56;
const pitchGeo  = new THREE.PlaneGeometry(PITCH_W, PITCH_D, 1, 1);
const pitchMat  = new THREE.MeshStandardMaterial({
  map:          grassTex,
  roughness:    0.95,

});
const pitchMesh = new THREE.Mesh(pitchGeo, pitchMat);
pitchMesh.rotation.x = -Math.PI / 2;

// Alternating mow stripes (overlay)

    new THREE.PlaneGeometry(PITCH_W - 0.4, 4),
    new THREE.MeshBasicMaterial({ color: 0x1f6820, transparent: true, opacity: 0.3 })
  );

  stripe.position.set(0, 0.003, -PITCH_D/2 + 2 + i * 8);
  scene.add(stripe);
}

// Pitch markings overlay — alphaTest cuts transparent pixels, no opacity rectangle
const markingsMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(PITCH_W, PITCH_D),
  new THREE.MeshBasicMaterial({ map: markingsTex, transparent: true, alphaTest: 0.05, depthWrite: false })
);
markingsMesh.rotation.x = -Math.PI / 2;
markingsMesh.position.y = 0.006;
scene.add(markingsMesh);

// ── SURROUND (dirt track area + apron) ────────────────────────────────────

  new THREE.PlaneGeometry(PITCH_W + 12, PITCH_D + 12),
  new THREE.MeshStandardMaterial({ color: 0x0a2e0a, roughness: 1 })
);
apron.rotation.x = -Math.PI / 2;
apron.position.y = -0.01;

// Running track surround

  new THREE.MeshStandardMaterial({ color: 0x8b3a2a, roughness: 0.9 })
);
trackMesh.rotation.x = -Math.PI / 2;
trackMesh.position.y = -0.008;

// ── GOALS ─────────────────────────────────────────────────────────────────
function addGoal(z) {
  const mat = new THREE.MeshStandardMaterial({
    color: 0xfafafa, roughness: 0.1, metalness: 0.6
  });
  const GH = 2.44, GW = 7.32, GD = 2.0;
  const r = 0.06;

  // Posts + crossbar
  [[-GW/2, GH/2, 0], [GW/2, GH/2, 0]].forEach(([px]) => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(r, r, GH, 16), mat);
    post.position.set(px, GH/2, z); post.castShadow = true; scene.add(post);
  });
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(r, r, GW + r*2, 16), mat);
  bar.rotation.z = Math.PI / 2; bar.position.set(0, GH, z); bar.castShadow = true; scene.add(bar);

  // Back net (subtle wireframe)
  const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.07, wireframe: true });
  const netBack = new THREE.Mesh(new THREE.PlaneGeometry(GW, GH, 14, 8), netMat);
  netBack.position.set(0, GH/2, z + (z < 0 ? -GD : GD)); scene.add(netBack);

  const netTop = new THREE.Mesh(new THREE.PlaneGeometry(GW, GD, 14, 4), netMat);
  netTop.rotation.x = Math.PI/2;
  netTop.position.set(0, GH, z + (z < 0 ? -GD/2 : GD/2)); scene.add(netTop);
}
addGoal(-PITCH_D/2 + 0.5);
addGoal( PITCH_D/2 - 0.5);

// ── ADVERTISING HOARDINGS ─────────────────────────────────────────────────
function makeAdBoard(text, color) {
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 512, 128);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  return new THREE.CanvasTexture(cv);
}

const ADS = [
  { text: 'ALEXANDROS FC', color: '#003087' },
  { text: 'THOMAS MORE',   color: '#8b0000' },
  { text: 'ASV GEEL',      color: '#006400' },
  { text: 'PYTHON  ·  JS', color: '#1a1a2e' },
];

const HOARD_H = 0.9, HOARD_THICK = 0.08;
const boardMat = (tex) => new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8, emissive: new THREE.Color(0.08,0.08,0.08) });

// Along long sides
for (let side of [-1, 1]) {
  const x = side * (PITCH_W/2 + 0.5);
  const segW = PITCH_D / ADS.length;
  ADS.forEach((ad, i) => {
    const brd = new THREE.Mesh(
      new THREE.BoxGeometry(segW - 0.2, HOARD_H, HOARD_THICK),
      boardMat(makeAdBoard(ad.text, ad.color))
    );
    brd.position.set(x, HOARD_H/2, -PITCH_D/2 + segW/2 + i * segW);
    brd.rotation.y = side > 0 ? Math.PI : 0;
    scene.add(brd);
  });
}

// Behind goals
for (let side of [-1, 1]) {
  const z = side * (PITCH_D/2 + 0.5);
  const brd = new THREE.Mesh(
    new THREE.BoxGeometry(PITCH_W + 1, HOARD_H, HOARD_THICK),
    boardMat(makeAdBoard('ALEXANDROS GIORGINIS · GK · DEV · 94 OVR', '#0a0a2e'))
  );
  brd.position.set(0, HOARD_H/2, z);
  brd.rotation.y = side > 0 ? Math.PI : 0;
  scene.add(brd);
}

// ══════════════════════════════════════════════════════════════════════════
//  STANDS (tiered seating)
// ══════════════════════════════════════════════════════════════════════════

// Seat colors — realistic mix like a real stadium
const SEAT_COLORS = [
  0xcc1111, 0xaa0000, 0xdd2222, // reds
  0x1133bb, 0x0022aa, 0x2244cc, // blues
  0xeeeeee, 0xdddddd,           // whites
  0x111111, 0x222222,           // darks
];

function buildStand(config) {
  const { startX, startZ, width, depth, rows, tilt, axis, flip } = config;

  const SEAT_W = 0.55, SEAT_D = 0.55, SEAT_H = 0.42;
  const ROW_RISE = 0.65, ROW_STEP = 0.7;
  const seatsPerRow = Math.floor(width / SEAT_W);
  const totalSeats  = seatsPerRow * rows;

  const seatGeo = new THREE.BoxGeometry(SEAT_W * 0.85, SEAT_H, SEAT_D * 0.85);
  const dummy   = new THREE.Object3D();

  // Use multiple InstancedMeshes, one per color
  const instanced = SEAT_COLORS.map(c =>
    new THREE.InstancedMesh(seatGeo, new THREE.MeshLambertMaterial({ color: c }), Math.ceil(totalSeats / SEAT_COLORS.length) + 100)
  );
  const counters = new Array(SEAT_COLORS.length).fill(0);

  // Concrete backing
  const backing = new THREE.Mesh(
    new THREE.BoxGeometry(width + 1, rows * ROW_RISE + 1, depth + 0.5),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95 })
  );

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < seatsPerRow; col++) {
      const ci = Math.floor(Math.random() * SEAT_COLORS.length);
      const ii = counters[ci]++;
      if (ii >= instanced[ci].count) continue;

      const sx = startX + (axis === 'x' ? 0 : (col - seatsPerRow/2) * SEAT_W);
      const sy = row * ROW_RISE + SEAT_H/2;
      const sz = startZ + (axis === 'x' ? (col - seatsPerRow/2) * SEAT_W : 0)
               + (axis === 'z' ? row * ROW_STEP * flip : 0);

      dummy.position.set(
        sx + (axis === 'x' ? row * ROW_STEP * flip : 0),
        sy,
        sz
      );
      dummy.updateMatrix();
      instanced[ci].setMatrixAt(ii, dummy.matrix);
    }
  }

  instanced.forEach(mesh => {
    mesh.instanceMatrix.needsUpdate = true;
    mesh.castShadow = true;
    scene.add(mesh);
  });

  // Backing position
  backing.position.set(
    startX + (axis === 'x' ? rows * ROW_STEP * flip * 0.5 : 0),
    rows * ROW_RISE * 0.5,
    startZ + (axis === 'z' ? rows * ROW_STEP * flip * 0.5 : 0)
  );
  scene.add(backing);

  // Roof canopy
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(
      axis === 'x' ? rows * ROW_STEP + 8 : width + 2,
      0.25,
      axis === 'z' ? rows * ROW_STEP + 4 : depth + 2,
    ),
    new THREE.MeshStandardMaterial({ color: 0x0d0d12, roughness: 0.7, metalness: 0.4, transparent: true, opacity: 0.9 })
  );
  roof.position.set(
    startX + (axis === 'x' ? rows * ROW_STEP * flip * 0.5 : 0),
    rows * ROW_RISE + 1.5,
    startZ + (axis === 'z' ? rows * ROW_STEP * flip * 0.5 : 0)
  );
  scene.add(roof);
}

const STAND_ROWS = 10;

// East stand (x positive side)
buildStand({ startX: PITCH_W/2 + 9, startZ: 0, width: PITCH_D + 4, depth: 2, rows: STAND_ROWS, axis: 'x', flip: 1 });
// West stand
buildStand({ startX: -(PITCH_W/2 + 9), startZ: 0, width: PITCH_D + 4, depth: 2, rows: STAND_ROWS, axis: 'x', flip: -1 });
// North stand (behind south goal)
buildStand({ startX: 0, startZ: PITCH_D/2 + 9, width: PITCH_W + 20, depth: 2, rows: STAND_ROWS - 2, axis: 'z', flip: 1 });
// South stand
buildStand({ startX: 0, startZ: -(PITCH_D/2 + 9), width: PITCH_W + 20, depth: 2, rows: STAND_ROWS - 2, axis: 'z', flip: -1 });

// ── BIG SCREEN ────────────────────────────────────────────────────────────
function makeBigScreen() {
  const cv = document.createElement('canvas'); cv.width = 1024; cv.height = 512;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#030318'; ctx.fillRect(0,0,1024,512);

  // Top bar
  const g = ctx.createLinearGradient(0,0,1024,0);
  g.addColorStop(0,'#1a0033'); g.addColorStop(.5,'#2d0055'); g.addColorStop(1,'#1a0033');
  ctx.fillStyle=g; ctx.fillRect(0,0,1024,70);

  ctx.fillStyle='rgba(255,200,50,0.9)'; ctx.font='bold 30px Arial'; ctx.textAlign='center';
  ctx.fillText('ALEXANDROS FC', 512, 46);

  // Teams
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(40,90,380,160);
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(600,90,380,160);

  ctx.fillStyle='#fff'; ctx.font='bold 26px Arial'; ctx.textAlign='center';
  ctx.fillText('ALEXANDROS', 230, 130); ctx.fillText('WORLD XI', 790, 130);

  ctx.fillStyle='#ffcc44'; ctx.font='bold 90px Arial';
  ctx.fillText('1', 290, 230); ctx.fillText('0', 734, 230);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='bold 50px Arial';
  ctx.fillText('—', 512, 222);

  ctx.fillStyle='#fff'; ctx.font='bold 36px Arial';
  ctx.fillText("23'", 512, 134);

  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(0,280,1024,230);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='18px Arial';
  ctx.fillText('Welcome to Alexandros FC Stadium · Thomas More Geel · Belgium', 512, 360);
  ctx.fillStyle='rgba(255,200,50,0.8)'; ctx.font='bold 22px Arial';
  ctx.fillText('94 OVR · GK · DEV · 4 LANGUAGES · 2 COUNTRIES', 512, 400);

  return new THREE.CanvasTexture(cv);
}

const bigScreenTex = makeBigScreen();

[-1, 1].forEach(side => {
  const z = side * (PITCH_D/2 + 16);

  // Frame (darker border around screen)
  const sframe = new THREE.Mesh(
    new THREE.BoxGeometry(18.5, 10, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x060606, roughness: 0.4, metalness: 0.9 })
  );
  sframe.position.set(0, 17, z);
  scene.add(sframe);

  // Screen sits in FRONT of frame (toward pitch center)
  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(17, 9),
    new THREE.MeshBasicMaterial({
      map: bigScreenTex,
      color: new THREE.Color(3, 3, 3)  // multiply brightness so it blooms
    })
  );
  screen.position.set(0, 17, z - side * 0.2);  // in front of frame
  screen.rotation.y = side > 0 ? Math.PI : 0;
  scene.add(screen);

  // Support legs
  [[-7, 0],[7, 0]].forEach(([dx]) => {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.18, 0.25, 14, 10),
      new THREE.MeshStandardMaterial({ color: 0x222228, roughness: 0.5, metalness: 0.8 })
    );
    leg.position.set(dx, 10, z);
    scene.add(leg);
  });

  // Point light to cast screen glow onto pitch
  const sgl = new THREE.PointLight(0x2244cc, 2.5, 22);
  sgl.position.set(0, 17, z - side * 3);
  scene.add(sgl);
});

// ══════════════════════════════════════════════════════════════════════════
//  FLOODLIGHTS + VOLUMETRIC CONES
// ══════════════════════════════════════════════════════════════════════════
const TOWERS = [[-19,-18],[ 19,-18],[-19, 18],[ 19, 18]];

TOWERS.forEach(([tx, tz]) => {
  // Tower pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.35, 28, 12),
    new THREE.MeshStandardMaterial({ color: 0x3a3a42, roughness: 0.6, metalness: 0.8 })
  );
  pole.position.set(tx, 14, tz);
  pole.castShadow = true;
  scene.add(pole);

  // Crossbar at top
  const arm = new THREE.Mesh(
    new THREE.BoxGeometry(3, 0.2, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x3a3a42 })
  );
  arm.position.set(tx, 28, tz); scene.add(arm);

  // Light housing
  const housing = new THREE.Mesh(
    new THREE.BoxGeometry(2.5, 0.5, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.4, metalness: 0.9 })
  );
  housing.position.set(tx, 28.4, tz); scene.add(housing);

  // Actual SpotLight — high res shadows
  const spot = new THREE.SpotLight(0xfff8e0, 6, 120, Math.PI / 5.5, 0.35, 0.5);
  spot.position.set(tx, 28, tz);
  spot.target.position.set(0, 0, 0);
  spot.castShadow = true;
  spot.shadow.mapSize.width  = 1024;
  spot.shadow.mapSize.height = 1024;
  spot.shadow.camera.near = 1;
  spot.shadow.camera.far  = 140;
  scene.add(spot); scene.add(spot.target);

  // Lens flare glow (emissive sphere)
  const flare = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xfff5cc })
  );
  flare.position.set(tx, 28.4, tz); scene.add(flare);

  // Volumetric light cone (transparent geometry trick)
  const coneLen = 34;
  const coneR   = Math.tan(Math.PI / 5.5) * coneLen;
  const coneGeo = new THREE.ConeGeometry(coneR, coneLen, 32, 1, true);
  const coneMat = new THREE.MeshBasicMaterial({
    color: 0xfff0cc,
    transparent: true,
    opacity: 0.018,
    side: THREE.FrontSide,
    depthWrite: false,
  });
  const cone = new THREE.Mesh(coneGeo, coneMat);

  // Orient cone from tower toward pitch center
  const towerPos = new THREE.Vector3(tx, 28, tz);
  const target   = new THREE.Vector3(0, 0, 0);
  const dir      = target.clone().sub(towerPos).normalize();

  cone.position.copy(towerPos).addScaledVector(dir, coneLen * 0.5);
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, -1, 0), dir);
  scene.add(cone);

  // Second pass (slightly wider, even more transparent)
  const cone2 = cone.clone();
  cone2.material = coneMat.clone();
  cone2.material.opacity = 0.008;
  cone2.scale.set(1.3, 1, 1.3);
  scene.add(cone2);
});

// ── Ground light (grass lit by stadium) ───────────────────────────────────
const groundGlow = new THREE.PointLight(0x2a6622, 0.8, 40);
groundGlow.position.set(0, 0.5, 0);
scene.add(groundGlow);

// ── Ambient (minimal — dark night) ────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x060814, 2));

// ── Corner flags ──────────────────────────────────────────────────────────
const flagColors = [0xcc1111, 0x1133cc, 0xcc1111, 0x1133cc];
[[-17,-27],[17,-27],[-17,27],[17,27]].forEach(([fx,fz],i) => {
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.5,8),new THREE.MeshStandardMaterial({color:0xfafafa}));
  pole.position.set(fx, 0.75, fz); scene.add(pole);
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.35),new THREE.MeshBasicMaterial({color:flagColors[i],side:THREE.DoubleSide}));
  flag.position.set(fx+0.25,1.4,fz); scene.add(flag);
});

// ══════════════════════════════════════════════════════════════════════════
//  CAMERA MOUSE PARALLAX + SLOW ORBIT
// ══════════════════════════════════════════════════════════════════════════
let mx = 0, my = 0, tx2 = 0, ty2 = 0;
let orbitAngle = 0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX / innerWidth  - 0.5) * 2;
  my = (e.clientY / innerHeight - 0.5) * 2;
});

// ── HIDE LOADING ───────────────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('loading').classList.add('out');
  setTimeout(() => document.getElementById('loading').style.display='none', 900);
}, 200);

// ── ANIMATE ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Smooth mouse
  tx2 += (mx - tx2) * 0.03;
  ty2 += (my - ty2) * 0.03;

  // Slow cinematic orbit
  orbitAngle += 0.00025;
  const orbitR = 58;
  const baseX  =  Math.sin(orbitAngle) * orbitR;
  const baseZ  =  Math.cos(orbitAngle) * orbitR;

  camera.position.set(
    baseX + tx2 * 6,
    20 + ty2 * -4,
    baseZ
  );
  camera.lookAt(tx2 * 2, 1.5, 0);

  // Subtle flicker on floodlights (imperceptible but real)
  // (no per-frame access needed — bloom handles the "aliveness")

  composer.render();
}

animate();
</script>
</body>
</html>
